# @package task
defaults:
  - base/hdmi-base
  - _self_

name: G1OpenChairSit

viewer:
  lookat: [0.5, 0.0, 0.5]
  eye: [1.0, -2.5, 1.5]

robot:
  name: g1
  robot_type: g1_29dof_rubberhand-feet_box-eef_box-body_capsule

command:
  data_path: data/motion/g1/multi_motion_0726/open_chair_and_sit_amass
  root_body_name: "pelvis"

  object_asset_name: "chair"
  # The current motion clip still labels the tracked object as foldchair.
  object_motion_name: "foldchair"
  object_body_name: "object"

  object_pose_range:
    roll: [-0.0, 0.0]
    pitch: [-0.0, 0.0]

  contact_target_pos_offset:
    - [0.28, -0.1, 0.35]  # left wrist
    - [0.28, 0.1, 0.35]   # right wrist

randomization:
  object_body_randomization:
    static_dynamic_friction_ratio_range: [1.0, 2.0]
    dynamic_friction_range: [0.3, 0.8]
    restitution_range: [0.0, 0.2]
    mass_range: [3.0, 8.0]
  
  body_scale:
    name: "chair"
    scale_range: [0.9, 1.1]

termination:
  cum_object_pos_error:     {min_steps: 5000, threshold: 1.0}
  cum_object_ori_error:     {min_steps: 5000, threshold: 5.0}

  cum_lost_contact_steps:   {min_steps: 200, pos_thres: 0.2, frc_thres: 1.0}
